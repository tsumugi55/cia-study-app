<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIA直前確認ノートを開く</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f8f4;
      color: #1d2528;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 18px;
    }

    main {
      width: min(520px, 100%);
      border: 1px solid #dfe5df;
      border-radius: 8px;
      background: #fff;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(30, 44, 43, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.45rem;
    }

    p {
      margin: 0 0 16px;
      color: #667277;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      border-radius: 8px;
      background: #176b63;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>CIA直前確認ノート</h1>
    <p>アプリ本体を開きます。データはこのブラウザのlocalStorageに保存されます。</p>
    <a href="index.html">アプリを開く</a>
  </main>
</body>
</html>
